		<script>
			// 深色模式初始化
			if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
				document.documentElement.classList.add('dark')
			} else {
				document.documentElement.classList.remove('dark')
			}

			// 深色模式切换函数
			function toggleDarkMode() {
				if (document.documentElement.classList.contains('dark')) {
					document.documentElement.classList.remove('dark')
					localStorage.theme = 'light'
				} else {
					document.documentElement.classList.add('dark')
					localStorage.theme = 'dark'
				}
			}

			// 搜索功能
			function performSearch() {
				const query = document.getElementById('search-input').value.toLowerCase();
				const resultsContainer = document.getElementById('search-results');
				const loadingElement = document.getElementById('search-loading');
				const emptyElement = document.getElementById('search-empty');

				if (!query.trim()) {
					resultsContainer.innerHTML = '';
					emptyElement.classList.add('hidden');
					return;
				}

				loadingElement.classList.remove('hidden');
				emptyElement.classList.add('hidden');

				// 模拟搜索延迟
				setTimeout(() => {
					fetch('/search.json')
						.then(response => response.json())
						.then(data => {
							const results = data.filter(post =>
								post.title.toLowerCase().includes(query) ||
								post.content.toLowerCase().includes(query) ||
								(post.tags && post.tags.some(tag => tag.toLowerCase().includes(query)))
							);

							loadingElement.classList.add('hidden');

							if (results.length === 0) {
								emptyElement.classList.remove('hidden');
								resultsContainer.innerHTML = '';
							} else {
								emptyElement.classList.add('hidden');
								displaySearchResults(results, query);
							}
						})
						.catch(error => {
							console.error('搜索出错:', error);
							loadingElement.classList.add('hidden');
							emptyElement.classList.remove('hidden');
						});
				}, 300);
			}

			function displaySearchResults(results, query) {
				const resultsContainer = document.getElementById('search-results');
				resultsContainer.innerHTML = results.map(post => {
					const highlightedTitle = highlightText(post.title, query);
					const excerpt = getExcerpt(post.content, query);
					const highlightedExcerpt = highlightText(excerpt, query);

					return `
					<article class="bg-white dark:bg-gray-800 rounded-lg shadow-md hover:shadow-lg transition-shadow duration-300 p-6 border border-gray-200 dark:border-gray-700">
						<h3 class="text-xl font-semibold mb-2">
							<a href="${post.url}" class="text-gray-900 dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
								${highlightedTitle}
							</a>
						</h3>
						<p class="text-gray-600 dark:text-gray-300 mb-3 leading-relaxed">
							${highlightedExcerpt}
						</p>
						<div class="flex items-center justify-between text-sm text-gray-500 dark:text-gray-400">
							<time datetime="${post.date}">${new Date(post.date).toLocaleDateString('zh-CN')}</time>
							${post.tags ? `<div class="flex gap-2">${post.tags.map(tag => `<span class="bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 px-2 py-1 rounded-full text-xs">${tag}</span>`).join('')}</div>` : ''}
						</div>
					</article>
				`;
				}).join('');
			}

			function highlightText(text, query) {
				if (!query) return text;
				const regex = new RegExp(`(${query})`, 'gi');
				return text.replace(regex, '<mark class="bg-yellow-200 dark:bg-yellow-800 px-1 rounded">$1</mark>');
			}

			function getExcerpt(content, query, maxLength = 200) {
				const queryIndex = content.toLowerCase().indexOf(query.toLowerCase());
				if (queryIndex === -1) {
					return content.substring(0, maxLength) + (content.length > maxLength ? '...' : '');
				}

				const start = Math.max(0, queryIndex - 50);
				const end = Math.min(content.length, queryIndex + query.length + 150);
				let excerpt = content.substring(start, end);

				if (start > 0) excerpt = '...' + excerpt;
				if (end < content.length) excerpt = excerpt + '...';

				return excerpt;
			}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const floatingToc = document.getElementById('floating-toc');
            const tocPanel = document.getElementById('toc-panel');
            const tocNav = document.getElementById('toc-nav');
            const postContent = document.getElementById('post-content');

            if (!floatingToc || !tocPanel || !tocNav || !postContent) return;

            // Move TOC to body to avoid positioning issues with glassmorphism containers
            document.body.appendChild(floatingToc);

            // 生成目录
            function generateTOC() {
                const headings = postContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
                if (headings.length === 0) return false;

                let tocHTML = '<ul class="toc-list">';
                let currentLevel = 0;

                headings.forEach((heading, index) => {
                    const level = parseInt(heading.tagName.charAt(1));
                    const text = heading.textContent || heading.innerText;
                    const id = heading.id || `toc-${index}`;

                    // 为标题添加ID（如果没有的话）
                    if (!heading.id) {
                        heading.id = id;
                    }

                    // 处理层级 for <ul> tags
                    if (level > currentLevel) {
                        for (let i = currentLevel; i < level; i++) {
                            if (i > 0) tocHTML += '<ul class="toc-list">';
                        }
                    } else if (level < currentLevel) {
                        for (let i = currentLevel; i > level; i--) {
                            tocHTML += '</ul>';
                        }
                    }

                    tocHTML += `
                <li class="toc-item toc-level-${level}">
                    <a href="#${id}" class="toc-link" data-target="${id}">
                        <span class="toc-text">${text}</span>
                    </a>
                </li>
            `;

                    currentLevel = level;
                });

                // 关闭剩余的ul标签
                for (let i = currentLevel; i > 1; i--) {
                    tocHTML += '</ul>';
                }
                tocHTML += '</ul>';

                tocNav.innerHTML = tocHTML;
                return true;
            }

            // 精确定位目录在左侧空白区域
            function positionTocInLeftMargin() {
                const mainContent = document.querySelector('.main-content');
                const tocPanel = document.getElementById('toc-panel');
                const postContent = document.querySelector('#post-content');

                if (!mainContent || !tocPanel || !postContent) return;

                const mainContentRect = mainContent.getBoundingClientRect();
                const leftSpace = mainContentRect.left;

                const tocWidth = 280;
                const marginBuffer = 32;

                if (leftSpace >= tocWidth + marginBuffer) {
                    const left = leftSpace - tocWidth - marginBuffer;
                    const postContentRect = postContent.getBoundingClientRect();
                    // Since we moved TOC to body, absolute positioning is relative to the document
                    // So we need to include scroll position in top calculation
                    const top = postContentRect.top + window.pageYOffset - 20;

                    tocPanel.style.left = left + 'px';
                    tocPanel.style.width = tocWidth + 'px';
                    tocPanel.style.top = top + 'px';
                    tocPanel.style.display = 'flex';
                } else {
                    tocPanel.style.display = 'none';
                }
            }

            // 初始化目录
            if (generateTOC()) {
                floatingToc.classList.remove('hidden');

                let isTocFixed = false;
                let ticking = false;

                function onWindowScroll() {
                    if (ticking) return;

                    ticking = true;
                    requestAnimationFrame(() => {
                        // --- 1. 高亮当前章节 ---
                        const headings = postContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
                        let activeHeadingId = null;
                        for (let i = headings.length - 1; i >= 0; i--) {
                            if (headings[i].getBoundingClientRect().top <= 100) {
                                activeHeadingId = headings[i].id;
                                break;
                            }
                        }
                        updateActiveTOCItem(activeHeadingId);

                        // --- 2. 处理面板固定/绝对定位 ---
                        const mainContent = document.querySelector('.main-content');
                        if (mainContent) {
                            const shouldFix = mainContent.getBoundingClientRect().top < 100;
                            if (shouldFix && !isTocFixed) {
                                isTocFixed = true;
                                positionTocInLeftMargin();
                                tocPanel.classList.add('is-fixed');
                            } else if (!shouldFix && isTocFixed) {
                                isTocFixed = false;
                                tocPanel.classList.remove('is-fixed');
                                // Reset to absolute position when un-fixing
                                positionTocInLeftMargin();
                            }
                        }

                        ticking = false;
                    });
                }

                // 定位目录
                positionTocInLeftMargin();

                // 监听滚动和窗口大小改变
                window.addEventListener('scroll', onWindowScroll);
                window.addEventListener('resize', positionTocInLeftMargin);

                // 初始检查
                onWindowScroll();

                // 目录点击事件
                tocNav.addEventListener('click', function (e) {
                    e.preventDefault();
                    const link = e.target.closest('.toc-link');
                    if (!link) return;

                    const targetId = link.getAttribute('data-target');
                    const targetElement = document.getElementById(targetId);

                    if (targetElement) {
                        // 平滑滚动到目标位置
                        const headerOffset = 80; // 考虑固定头部的高度
                        const elementPosition = targetElement.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });

                        // 更新活跃状态
                        updateActiveTOCItem(targetId);
                    }
                });

                // 滚动时高亮当前章节
                function updateActiveTOCItem(activeId) {
                    // 移除所有活跃状态
                    tocNav.querySelectorAll('.toc-link').forEach(link => {
                        link.classList.remove('active');
                    });

                    // 添加当前活跃状态
                    if (activeId) {
                        const activeLink = tocNav.querySelector(`[data-target="${activeId}"]`);
                        if (activeLink) {
                            activeLink.classList.add('active');
                        }
                    }
                }
            }
        });
    </script>

>61</span><br><span class="line">62</span><br></pre></td><td class="code"><pre><span class="line">package main</span><br><span class="line"></span><br><span class="line">import (</span><br><span class="line">	&quot;context&quot;</span><br><span class="line">	&quot;github.com/gorilla/mux&quot;</span><br><span class="line">	&quot;github.com/txn2/txeh&quot;</span><br><span class="line">	&quot;log&quot;</span><br><span class="line">	&quot;net/http&quot;</span><br><span class="line">	&quot;net/http/httputil&quot;</span><br><span class="line">	&quot;net/url&quot;</span><br><span class="line">	&quot;os&quot;</span><br><span class="line">	&quot;os/signal&quot;</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line">var hostArr = []string&#123;&quot;project-01&quot;, &quot;project-02&quot;&#125;</span><br><span class="line"></span><br><span class="line">const (</span><br><span class="line">	host     = &quot;api-dev.deveye.cn&quot;</span><br><span class="line">	proxyUrl = &quot;https://api-dev.deveye.cn/&quot;</span><br><span class="line">	address  = &quot;127.0.0.1&quot;</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line">func main() &#123;</span><br><span class="line">	hosts, err := txeh.NewHostsDefault()</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		panic(err)</span><br><span class="line">	&#125;</span><br><span class="line">	hosts.AddHosts(address, hostArr)</span><br><span class="line">	log.Println(hosts.Save())</span><br><span class="line">	r := mux.NewRouter()</span><br><span class="line">	r.Use(LoggingHandler, AuthHandler, RecoverHandler)</span><br><span class="line">		r.PathPrefix(&quot;/&quot;).HandlerFunc(ReverseProxy)</span><br><span class="line">	srv := &amp;http.Server&#123;</span><br><span class="line">		Addr:    &quot;:80&quot;,</span><br><span class="line">		Handler: r,</span><br><span class="line">	&#125;</span><br><span class="line">	go func() &#123;</span><br><span class="line">		if err := srv.ListenAndServe(); err != nil &#123;</span><br><span class="line">			log.Println(err)</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;()</span><br><span class="line">	c := make(chan os.Signal, 1)</span><br><span class="line">	signal.Notify(c, os.Interrupt)</span><br><span class="line">	&lt;-c</span><br><span class="line">	ctx, cancel := context.WithCancel(context.Background())</span><br><span class="line">	defer cancel()</span><br><span class="line">	log.Println(srv.Shutdown(ctx))</span><br><span class="line">	hosts.RemoveHosts(hostArr)</span><br><span class="line">	log.Println(hosts.Save())</span><br><span class="line">	log.Println(&quot;shutting down&quot;)</span><br><span class="line">	os.Exit(0)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func ReverseProxy(w http.ResponseWriter, r *http.Request) &#123;</span><br><span class="line">	u, err := url.Parse(proxyUrl)</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		log.Println(err)</span><br><span class="line">	&#125;</span><br><span class="line">	proxy := httputil.NewSingleHostReverseProxy(u)</span><br><span class="line">	r.Host = host</span><br><span class="line">	proxy.ServeHTTP(w, r)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">import (</span><br><span class="line">	&quot;bytes&quot;</span><br><span class="line">	&quot;encoding/json&quot;</span><br><span class="line">	&quot;errors&quot;</span><br><span class="line">	&quot;io/ioutil&quot;</span><br><span class="line">	&quot;log&quot;</span><br><span class="line">	&quot;net/http&quot;</span><br><span class="line">	&quot;time&quot;</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line">var loginUrl = proxyUrl + &quot;login/sms&quot;</span><br><span class="line"></span><br><span class="line">func LoggingHandler(next http.Handler) http.Handler &#123;</span><br><span class="line">	fn := func(w http.ResponseWriter, r *http.Request) &#123;</span><br><span class="line">		t1 := time.Now()</span><br><span class="line">		next.ServeHTTP(w, r)</span><br><span class="line">		t2 := time.Now()</span><br><span class="line">		log.Printf(&quot;[%s] %q %v&quot;, r.Method, r.URL.String(), t2.Sub(t1))</span><br><span class="line">	&#125;</span><br><span class="line">	return http.HandlerFunc(fn)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func RecoverHandler(next http.Handler) http.Handler &#123;</span><br><span class="line">	fn := func(w http.ResponseWriter, r *http.Request) &#123;</span><br><span class="line">		defer func() &#123;</span><br><span class="line">			if err := recover(); err != nil &#123;</span><br><span class="line">				log.Printf(&quot;Recover from panic: %+v&quot;, err)</span><br><span class="line">				http.Error(w, http.StatusText(500), 500)</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;()</span><br><span class="line">		next.ServeHTTP(w, r)</span><br><span class="line">	&#125;</span><br><span class="line">	return http.HandlerFunc(fn)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func AuthHandler(next http.Handler) http.Handler &#123;</span><br><span class="line">	return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) &#123;</span><br><span class="line">		token, err := getAccessToken()</span><br><span class="line">		if err != nil &#123;</span><br><span class="line">			log.Fatalln(err)</span><br><span class="line">		&#125;</span><br><span class="line">		r.Header.Set(&quot;X-Auth-AppId&quot;, &quot;10003&quot;)</span><br><span class="line">		r.Header.Set(&quot;X-Auth-Token&quot;, token)</span><br><span class="line">		next.ServeHTTP(w, r)</span><br><span class="line">	&#125;)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">func getAccessToken() (string, error) &#123;</span><br><span class="line">	params := map[string]string&#123;</span><br><span class="line">		&quot;phone&quot;:      &quot;15555555551&quot;,</span><br><span class="line">		&quot;verifyCode&quot;: &quot;888888&quot;,</span><br><span class="line">		&quot;codeId&quot;:     &quot;111111&quot;,</span><br><span class="line">	&#125;</span><br><span class="line">	marshal, _ := json.Marshal(params)</span><br><span class="line">	reader := bytes.NewReader(marshal)</span><br><span class="line">	request, _ := http.NewRequest(&quot;POST&quot;, loginUrl, reader)</span><br><span class="line">	request.Header.Add(&quot;X-Auth-AppId&quot;, &quot;10003&quot;)</span><br><span class="line">	request.Header.Set(&quot;content-type&quot;, &quot;application/json&quot;)</span><br><span class="line">	client := &amp;http.Client&#123;&#125;</span><br><span class="line">	do, err := client.Do(request)</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		return &quot;&quot;, err</span><br><span class="line">	&#125;</span><br><span class="line">	b, err := ioutil.ReadAll(do.Body)</span><br><span class="line">	if err != nil &#123;</span><br><span class="line">		return &quot;&quot;, err</span><br><span class="line">	&#125;</span><br><span class="line">	_ = do.Body.Close()</span><br><span class="line">	result := &amp;LoginResult&#123;&#125;</span><br><span class="line">	if err := json.Unmarshal(b, result); err != nil &#123;</span><br><span class="line">		return &quot;&quot;, err</span><br><span class="line">	&#125;</span><br><span class="line">	if result.ErrCode != &quot;0&quot; &#123;</span><br><span class="line">		return &quot;&quot;, errors.New(result.Message)</span><br><span class="line">	&#125;</span><br><span class="line">	return result.Data.Token, nil</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">type LoginResult struct &#123;</span><br><span class="line">	ErrCode string</span><br><span class="line">	Message string</span><br><span class="line">	Data    struct &#123;</span><br><span class="line">		Name  string</span><br><span class="line">		Token string</span><br><span class="line">		Phone string</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
